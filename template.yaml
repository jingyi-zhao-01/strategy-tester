AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Strategy Tester SAM Application

Globals:
  Function:
    Timeout: 300
    MemorySize: 512
    Runtime: python3.12
    Environment:
      Variables:
        DATABASE_URL: !Ref DatabaseUrl
        POLYGON_API_KEY: !Ref PolygonApiKey
        GRAFANA_OPEN_TELEMETRY_TOKEN: !Ref GrafanaOpenTelemetryToken
        OTEL_RESOURCE_ATTRIBUTES: !Ref OtelResourceAttributes
        OTEL_EXPORTER_OTLP_ENDPOINT: !Ref OtelExporterOtlpEndpoint
        OTEL_EXPORTER_OTLP_HEADERS: !Ref OtelExporterOtlpHeaders
        OTEL_EXPORTER_OTLP_PROTOCOL: !Ref OtelExporterOtlpProtocol
        OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED: !Ref OtelPythonLoggingAutoInstrumentationEnabled
        GRAFANA_SERVICE_NAME: !Ref GrafanaServiceName

Parameters:
  DatabaseUrl:
    Type: String
    Description: Database connection URL
    Default: ""
  PolygonApiKey:
    Type: String
    Description: Polygon API key
    Default: ""
  GrafanaOpenTelemetryToken:
    Type: String
    Default: ""
  OtelResourceAttributes:
    Type: String
    Default: ""
  OtelExporterOtlpEndpoint:
    Type: String
    Default: ""
  OtelExporterOtlpHeaders:
    Type: String
    Default: ""
  OtelExporterOtlpProtocol:
    Type: String
    Default: ""
  OtelPythonLoggingAutoInstrumentationEnabled:
    Type: String
    Default: ""
  GrafanaServiceName:
    Type: String
    Default: ""

Resources:
  IngestOptionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: cli.lambda_handler.ingest_options_handler
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
        Api:
          Type: Api
          Properties:
            Path: /process-options
            Method: get
    Metadata:
      BuildMethod: makefile

  IngestSnapshotsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: cli.lambda_handler.ingest_option_snapshots_handler
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
        Api:
          Type: Api
          Properties:
            Path: /process-options-snapshot
            Method: get
    Metadata:
      BuildMethod: makefile

  PingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: cli.lambda_handler.ping
      Timeout: 10
      MemorySize: 128
      Events:
        Api:
          Type: Api
          Properties:
            Path: /ping
            Method: get
    Metadata:
      BuildMethod: makefile

Outputs:
  ApiGatewayUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  IngestOptionsFunction:
    Description: "Ingest Options Lambda Function ARN"
    Value: !GetAtt IngestOptionsFunction.Arn
  IngestSnapshotsFunction:
    Description: "Ingest Snapshots Lambda Function ARN"
    Value: !GetAtt IngestSnapshotsFunction.Arn
