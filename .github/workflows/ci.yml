name: CI (tests)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.READ_PRIVATE_TOKEN }}



      - name: Select Python 3.12 via pyenv (persist for job)
        shell: bash
        run: |
          export PYENV_ROOT="$HOME/.pyenv"
          echo "PYENV_ROOT=$PYENV_ROOT" >> "$GITHUB_ENV"
          echo "$PYENV_ROOT/bin" >> "$GITHUB_PATH"
          echo "$PYENV_ROOT/shims" >> "$GITHUB_PATH"

          # Initialize pyenv for this step so we can install/select now
          export PATH="$PYENV_ROOT/bin:$PATH"
          eval "$(pyenv init -)"

          pyenv install -s 3.12.12
          pyenv global 3.12.12

          which python
          python --version

      - name: Debug python resolution
        run: |
          id
          echo "PATH=$PATH"
          which python || true
          python --version || true
          which pyenv || true
          pyenv --version || true

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies with uv
        run: |
          make setup

      - name: Generate Prisma client
        run: |
          .venv/bin/prisma generate --schema=prisma/schema.prisma

      - name: Run tests and generate coverage.xml
        run: |
          make test

      - name: Upload coverage as artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml


  sonar:
    needs: tests
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get coverage.xml from previous job
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml
          path: ./

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >-
            -Dsonar.projectKey=jingyi-zhao-01_strategy-tester
            -Dsonar.organization=jzhao62
            -Dsonar.python.coverage.reportPaths=coverage.xml
          projectBaseDir: .

  build-and-publish-images:
    needs: sonar
    if: github.event_name != 'pull_request'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: option-ingestor
            dockerfile: docker/option-ingestor.Dockerfile
          - service: snapshot-ingestor
            dockerfile: docker/snapshot-ingestor.Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/strategy-tester-${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
