name: CI (tests)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  tests:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.READ_PRIVATE_TOKEN }}

      - name: Show runner Python (debug)
        run: |
          which python
          python --version

      - name: Debug python resolution
        run: |
          id
          echo "PATH=$PATH"
          which python || true
          python --version || true
          which pyenv || true
          pyenv --version || true

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies with uv
        run: |
          uv sync --python /usr/bin/python --all-extras

      - name: Generate Prisma client
        run: |
          if uv run which prisma >/dev/null 2>&1; then
            uv run prisma generate
          elif which npx >/dev/null 2>&1; then
            npx prisma generate --schema=prisma/schema.prisma
          else
            echo "Prisma CLI not found in environment and npx not available" >&2
            exit 1
          fi

      - name: Run tests and generate coverage.xml
        run: |
          uv run pytest --cov=./ --cov-report=xml:coverage.xml -q

      - name: Upload coverage as artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml


